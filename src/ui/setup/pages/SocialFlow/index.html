    <title>SocialFlow</title>
    <!-- DNS prefetch for social networks — resolves DNS before webviews open -->
    <link rel="dns-prefetch" href="https://x.com" />
    <link rel="dns-prefetch" href="https://facebook.com" />
    <link rel="dns-prefetch" href="https://instagram.com" />
    <link rel="dns-prefetch" href="https://linkedin.com" />
    <link rel="dns-prefetch" href="https://tiktok.com" />
    <link rel="dns-prefetch" href="https://threads.net" />
    <link rel="dns-prefetch" href="https://discord.com" />
    <link rel="dns-prefetch" href="https://reddit.com" />
    <link rel="dns-prefetch" href="https://web.snapchat.com" />
    <link rel="dns-prefetch" href="https://web.whatsapp.com" />
    <link rel="dns-prefetch" href="https://web.telegram.org" />
    <link rel="dns-prefetch" href="https://www.pinterest.com" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
