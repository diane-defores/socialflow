name: Dev Builds (Android + Windows)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  android-debug:
    name: Android debug APK (arm64)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & set NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Use the NDK the runner already has — auto-detect from ANDROID_HOME/ndk/
          NDK_VERSION=$(ls "$ANDROID_HOME/ndk" | sort -V | tail -1)
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "Using NDK: $NDK_VERSION"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust stable with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android target
        run: pnpm exec tauri android init --ci

      - name: Build debug APK
        run: pnpm exec tauri android build --ci --debug --apk -t aarch64

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: socialflow-android-debug
          path: src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 14

  windows-test:
    name: Windows test installer
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundle
        run: pnpm exec tauri build --ci

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: socialflow-windows-test
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
